<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Ring</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .grid {
      margin-top: 30px;
    }

    .icon-wrap {
      position: relative;
      display: inline-flex;
    }

    .mail-badge {
      display: none;
      position: absolute;
      top: -6px;
      right: -6px;
      background: #e53935;
      color: #fff;
      font-size: clamp(9px, 2vw, 11px);
      font-weight: bold;
      min-width: clamp(16px, 4vw, 20px);
      height: clamp(16px, 4vw, 20px);
      border-radius: 9999px;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      box-sizing: border-box;
      pointer-events: none;
      z-index: 1;
    }

    .mail-badge.show {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <div class="container">
    <div class="header">
      <div class="title">ZENITH RING</div>
    </div>

    <div class="screen">
      <div class="screen-top">
        <span>v1.0</span>
        <div class="status">ONLINE</div>
        <div class="battery">
          <div class="battery-level"></div>
        </div>
      </div>

      <div class="grid">
        <button class="btn" onclick="location.href='profile/profile.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
            <path fill="currentColor" d="M8 9c3.85 0 7 2.5 7 4.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5C1 11.5 4.15 9 8 9m0-8a3.5 3.5 0 1 1 0 7a3.5 3.5 0 0 1 0-7"/>
          </svg>
          프로필
        </button>

        <button class="btn" onclick="location.href='battle.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="currentColor" d="M14.5 12a2.5 2.5 0 0 1-5 0a2.5 2.5 0 0 1 5 0m7.5 0c0 5.52-4.48 10-10 10S2 17.52 2 12S6.48 2 12 2s10 4.48 10 10m-2 0h-4c0-2.21-1.79-4-4-4s-4 1.79-4 4H4c0 4.41 3.59 8 8 8s8-3.59 8-8"/>
          </svg>
          배틀
        </button>

        <button class="btn" onclick="location.href='shop/shop.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
            <path fill="currentColor" fill-opacity="0.15" d="M839.5 344h-655c-.3 0-.5.2-.5.5v91.2c0 59.8 49 108.3 109.3 108.3c40.7 0 76.2-22 95.1-54.7c2.9-5.1 8.4-8.3 14.3-8.3s11.3 3.2 14.3 8.3c18.8 32.7 54.3 54.7 95 54.7c40.8 0 76.4-22.1 95.1-54.9c2.9-5 8.2-8.1 13.9-8.1h.6c5.8 0 11 3.1 13.9 8.1c18.8 32.8 54.4 54.9 95.2 54.9C791 544 840 495.5 840 435.7v-91.2c0-.3-.2-.5-.5-.5"/>
            <path fill="currentColor" d="M882 272.1V144c0-17.7-14.3-32-32-32H174c-17.7 0-32 14.3-32 32v128.1c-16.7 1-30 14.9-30 31.9v131.7a177 177 0 0 0 14.4 70.4c4.3 10.2 9.6 19.8 15.6 28.9v345c0 17.6 14.3 32 32 32h676c17.7 0 32-14.3 32-32V535a175 175 0 0 0 15.6-28.9c9.5-22.3 14.4-46 14.4-70.4V304c0-17-13.3-30.9-30-31.9M214 184h596v88H214zm362 656.1H448V736h128zm234.4 0H640V704c0-17.7-14.3-32-32-32H416c-17.7 0-32 14.3-32 32v136.1H214V597.9c2.9 1.4 5.9 2.8 9 4c22.3 9.4 46 14.1 70.4 14.1s48-4.7 70.4-14.1c13.8-5.8 26.8-13.2 38.7-22.1q.3-.15.6 0a180.4 180.4 0 0 0 38.7 22.1c22.3 9.4 46 14.1 70.4 14.1s48-4.7 70.4-14.1c13.8-5.8 26.8-13.2 38.7-22.1q.3-.15.6 0a180.4 180.4 0 0 0 38.7 22.1c22.3 9.4 46 14.1 70.4 14.1s48-4.7 70.4-14.1c3-1.3 6-2.6 9-4zM840 435.7c0 59.8-49 108.3-109.3 108.3c-40.8 0-76.4-22.1-95.2-54.9c-2.9-5-8.1-8.1-13.9-8.1h-.6c-5.7 0-11 3.1-13.9 8.1A109.24 109.24 0 0 1 512 544c-40.7 0-76.2-22-95-54.7c-3-5.1-8.4-8.3-14.3-8.3s-11.4 3.2-14.3 8.3a109.63 109.63 0 0 1-95.1 54.7C233 544 184 495.5 184 435.7v-91.2c0-.3.2-.5.5-.5h655c.3 0 .5.2.5.5z"/>
          </svg>
          매점
        </button>

        <!-- 메일함 버튼 -->
        <button class="btn" onclick="location.href='mail/mail.html'">
          <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
              <path fill="currentColor" d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h16q.825 0 1.413.588T22 6v12q0 .825-.587 1.413T20 20zm8-7L4 8v10h16V8zm0-2l8-5H4zM4 8V6v12z"/>
            </svg>
            <div class="mail-badge" id="mail-badge">0</div>
          </div>
          메일함
        </button>
      </div>
    </div>

    <div class="footer">Made by Sonnet with Ampharos</div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js"
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

    onAuthStateChanged(auth, user => {
      if (!user) {
        location.href = "index.html"
        return
      }

      onSnapshot(doc(db, "users", user.uid), snap => {
        const data = snap.data()
        const ringRequests = data?.ringRequests ?? []
        const inbox = data?.inbox ?? []

        const unreadNotes = inbox.filter(n => !n.read).length
        const total = ringRequests.length + unreadNotes

        const badge = document.getElementById("mail-badge")

        if (total > 0) {
          badge.innerText = total
          badge.classList.add("show")
        } else {
          badge.classList.remove("show")
        }
      })
    })
  </script>
</body>
</html>
