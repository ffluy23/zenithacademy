<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <style>

    .button{
      display: flex;
      gap: 5%;
    }

    .main-box{
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 480px) {
  .main-box {
    flex-direction: column;
    gap: 10px;
  }

  .button {
    justify-content: center;
  }
}

  </style>
  <title>Battleroom3</title>
</head>
<body>
  
<div class="container">
  <div class="header">
    <div class="title">ZENITH RING</div>
  </div>

  <div class="screen">
        <div class="screen-top">
            <span>v1.0</span>
            <div class="status">ONLINE</div>
            <div class="battery">
                <div class="battery-level"></div>
            </div>
        </div>
      <h2>Battle Room 3</h2>
<div class="main-box">
      <!--플레이어-->
      <div class="player">
        <div id="player1">Player1: 대기 중...</div>
        <div id="player2">Player2: 대기 중...</div>
      </div>
      <!--버튼-->
      <div class="button">
        <button class="btn" id="readyBtn">Ready</button>
        <button class="btn" id="leaveBtn">Leave</button>
      </div>
</div>
        

      <!--관전자-->
      <div id="spactator-list">관전자 없음</div>
      
      <!--교체 요청 표시-->
      <div id="swap-request-display"></div>

      
</div>
<div class="footer">Made by Sonnet with Ampharos</div>
</div>

  <script>
    const ROOM_ID = "battleroom3"
  </script>
  <script type="module" src="../js/firebase.js"></script>
  <script type="module" src="../js/battleroom.js"></script>

</body>
</html>
