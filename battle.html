<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .battleroom{
    display: flex;
    justify-content: center;
    gap: 4%;
  }
  h2{
    display: flex;
    justify-content: center;
  }

#battleroom{
  margin-bottom: 20px;
}

.logbtn{
    display: flex;
    margin: 0 5% 0 5% ;
    justify-content: space-between;
}

.btn{
  padding: 10px;
}

hr {
    margin:10px;
}

</style>

<div class="container">
  <div class="header">
    <div class="title">ZENITH RING</div>
  </div>

  <div class="screen">
        <div class="screen-top">
            <span>v1.0</span>
            <div class="status">ONLINE</div>
            <div class="battery">
                <div class="battery-level"></div>
            </div>
        </div>
      <h2>Battleroom</h2>
    <div class="battleroom">
      <button class="btn" id="battleroom" onclick="enterRoom(1)">Room1</button>
      <button class="btn" id="battleroom" onclick="enterRoom(2)">Room2</button>
      <button class="btn" id="battleroom" onclick="enterRoom(3)">Room3</button>
    </div>
    <hr>
    <div class="logbtn">
    <button class="btn" onclick="location.href='main.html'">← 돌아가기</button>
    <button class="btn" onclick="location.href='battlelog.html'">로그 보기</button>
    </div>
</div>
<div class="footer">Made by Sonnet with Ampharos</div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
